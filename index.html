<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <title>Phoenix 89 - Web Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: #000;
            font-family: monospace;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            width: 100%;
            height: 100%;
            height: 100dvh;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #333;
        }

        /* Mobile: no border, fill screen */
        @media (pointer: coarse) {
            canvas {
                border: none;
                /* Position absolutely to ignore safe-area insets */
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="640" height="560"></canvas>

    <!-- Firebase SDK (leaderboard) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({
            databaseURL: "https://phoenix89-scores-default-rtdb.firebaseio.com"
        });
        window.firebaseDB = firebase.database();
    </script>

    <!-- Load scripts in order -->
    <script src="economy.js"></script>
    <script src="constants.js"></script>
    <script>
        // Set canvas size from game constants
        const c = document.getElementById('gameCanvas');
        c.width = SCREEN_WIDTH;
        c.height = SCREEN_HEIGHT;
    </script>
    <script src="sprites.js"></script>
    <script src="sound.js"></script>
    <script src="player.js"></script>
    <script src="weapons.js"></script>
    <script src="enemies.js"></script>
    <script src="levels.js"></script>
    <script src="changelog.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>

    <!-- Nipplejs virtual joystick (only used on touch devices) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.2/nipplejs.min.js"></script>
    <!-- Mobile touch controls -->
    <script src="mobile.js"></script>

    <script>
        // Prevent default arrow key and space scrolling
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
